name: Build APK

# Compila o app automaticamente toda vez que você enviar (push) código
# para o branch "main", ou quando você disparar manualmente pela aba Actions.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Compilar APK com a imagem oficial do Buildozer
        run: |
          yes | docker run --rm --interactive \
            --volume "${{ github.workspace }}":/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Publicar o APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: ficha-dnd-apk
          path: bin/*.apk
