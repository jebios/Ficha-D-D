name: Build APK

# Compila o app automaticamente toda vez que você enviar (push) código
# para o branch "main", ou quando você disparar manualmente pela aba Actions.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compilar APK com Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable

      - name: Publicar o APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: ficha-dnd-apk
          path: ${{ steps.buildozer.outputs.filename }}
